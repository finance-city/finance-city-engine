<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance City Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Loading overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: opacity 0.5s ease;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay h1 {
            font-size: 2rem;
            color: #4a9eff;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        #overlay .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #222;
            border-top: 4px solid #4a9eff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #statusText {
            font-size: 0.85rem;
            color: #aaa;
            font-family: 'Courier New', monospace;
        }

        /* Fullscreen button */
        #fullscreenBtn {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(74, 158, 255, 0.4);
            color: #4a9eff;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        #fullscreenBtn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="overlay">
        <h1>Finance City Engine</h1>
        <p class="subtitle">WebGPU / WebAssembly</p>
        <div class="spinner"></div>
        <div id="statusText">Loading...</div>
    </div>

    <button id="fullscreenBtn" title="Toggle Fullscreen (F)">&#x26F6;</button>

    <script type="text/javascript">
        var overlay = document.getElementById('overlay');
        var statusText = document.getElementById('statusText');
        var canvas = document.getElementById('canvas');

        // Canvas buffer size is managed by C++/GLFW via Emscripten's resize callback.
        // CSS (width: 100vw; height: 100vh) handles the visual fullscreen layout.

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function() {});
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            }
        });

        var Module = {
            canvas: canvas,

            preRun: [],
            postRun: [],

            print: function(text) {
                console.log('[stdout] ' + text);
                if (statusText) statusText.textContent = text;
            },

            printErr: function(text) {
                console.error('[stderr] ' + text);
                if (statusText) {
                    statusText.innerHTML = '<span style="color:#ff4a4a">Error: ' + text + '</span>';
                }
            },

            setStatus: function(text) {
                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
                if (text === Module.setStatus.last.text) return;

                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                var now = Date.now();
                if (m && now - Module.setStatus.last.time < 30) return;
                Module.setStatus.last.time = now;
                Module.setStatus.last.text = text;

                if (m) text = m[1];

                console.log('[status] ' + text);
                if (statusText) statusText.textContent = text;

                if (!text) {
                    overlay.classList.add('hidden');
                    setTimeout(function() { overlay.style.display = 'none'; }, 500);
                }
            },

            totalDependencies: 0,

            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left
                    ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
                    : 'All downloads complete.');
            }
        };

        Module.setStatus('Downloading...');

        window.onerror = function(msg, url, lineNo, columnNo, error) {
            Module.setStatus('Exception: ' + msg);
            console.error('Error:', msg, url, lineNo, columnNo, error);
            return false;
        };
    </script>

    {{{ SCRIPT }}}
</body>
</html>
